name: Build iOS IPA (unsigned)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Show versions
        run: |
          flutter --version
          xcodebuild -version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Pre-cache iOS artifacts
        run: flutter precache --ios

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --verbose

      - name: Package unsigned IPA
        run: |
          set -e
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r futemax_clean-unsigned.ipa Payload
          ls -lh futemax_clean-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: futemax_clean-unsigned-ipa
          path: build/ios/iphoneos/futemax_clean-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
