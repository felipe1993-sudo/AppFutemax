name: futemax_clean
description: App que carrega o futemax.bot em uma WebView e remove anúncios via JS Injection.
publish_to: 'none'
version: 5.0.0+5

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
